services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: industrial-rag-router
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      PYTHONPATH: /app
    volumes:
      - ./data:/app/data
      - ./faiss_index:/app/faiss_index
    restart: unless-stopped
